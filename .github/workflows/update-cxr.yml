name: Update CXR Data

on:
  schedule:
    # Every 2 hours — 12 runs/day (ICT Vietnam = UTC+7, same as Thailand)
    # Offset by +30 min from HKT workflow to avoid simultaneous git push races.
    - cron: '30 0 * * *'
    - cron: '30 2 * * *'
    - cron: '30 4 * * *'
    - cron: '30 6 * * *'
    - cron: '30 8 * * *'
    - cron: '30 10 * * *'
    - cron: '30 12 * * *'
    - cron: '30 14 * * *'
    - cron: '30 16 * * *'
    - cron: '30 18 * * *'
    - cron: '30 20 * * *'
    - cron: '30 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-cxr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz

      - name: Run CXR collector
        run: python3 -m cxr.collector
        env:
          PYTHONPATH: .
          AVIATIONSTACK_KEY_1: ${{ secrets.AVIATIONSTACK_KEY_1 }}
          AVIATIONSTACK_KEY_2: ${{ secrets.AVIATIONSTACK_KEY_2 }}
          AVIATIONSTACK_KEY_3: ${{ secrets.AVIATIONSTACK_KEY_3 }}
          AVIATIONSTACK_KEY_4: ${{ secrets.AVIATIONSTACK_KEY_4 }}
          TG_TOKEN:            ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:          ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push CXR data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add cxr/data/dashboard.json cxr/data/accumulated_*.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: update CXR flight data $(date '+%Y-%m-%d %H:%M ICT')"
            git pull --rebase "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            echo "No CXR changes to commit"
          fi
