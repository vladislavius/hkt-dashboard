name: Update PQC Data

on:
  schedule:
    - cron: '15 0 * * *'
    - cron: '15 2 * * *'
    - cron: '15 4 * * *'
    - cron: '15 6 * * *'
    - cron: '15 8 * * *'
    - cron: '15 10 * * *'
    - cron: '15 12 * * *'
    - cron: '15 14 * * *'
    - cron: '15 16 * * *'
    - cron: '15 18 * * *'
    - cron: '15 20 * * *'
    - cron: '15 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-pqc:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz beautifulsoup4 certifi

      - name: Run PQC collector
        run: python3 -m pqc.collector
        env:
          PYTHONPATH: .
          AVIATIONSTACK_KEY_1: ${{ secrets.AVIATIONSTACK_KEY_1 }}
          AVIATIONSTACK_KEY_2: ${{ secrets.AVIATIONSTACK_KEY_2 }}
          AVIATIONSTACK_KEY_3: ${{ secrets.AVIATIONSTACK_KEY_3 }}
          AVIATIONSTACK_KEY_4: ${{ secrets.AVIATIONSTACK_KEY_4 }}
          TG_TOKEN:            ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:          ${{ secrets.TG_CHAT_ID }}

      - name: Commit and push PQC data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pqc/data/dashboard.json pqc/data/accumulated_*.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: update PQC flight data $(date '+%Y-%m-%d %H:%M ICT')"
            git pull --rebase "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" main
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:main
          else
            echo "No PQC changes to commit"
          fi
