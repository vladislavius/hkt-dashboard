name: Update HKT Data

on:
  schedule:
    - cron: '30 17 * * *'  # 00:30 ICT — ночь               (KEY_1)
    - cron: '0 22 * * *'   # 05:00 ICT — утро               (KEY_2)
    - cron: '0 2 * * *'    # 09:00 ICT — день               (KEY_3)
    - cron: '0 6 * * *'    # 13:00 ICT — день               (KEY_4)
    - cron: '0 10 * * *'   # 17:00 ICT — вечер              (KEY_1)
    - cron: '58 16 * * *'  # 23:58 ICT — финализация дня    (KEY_2)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pytz beautifulsoup4

      - name: Run collector script
        run: python3 collector.py
        env:
          PYTHONPATH: .
          AVIATIONSTACK_KEY_1: ${{ secrets.AVIATIONSTACK_KEY_1 }}
          AVIATIONSTACK_KEY_2: ${{ secrets.AVIATIONSTACK_KEY_2 }}
          AVIATIONSTACK_KEY_3: ${{ secrets.AVIATIONSTACK_KEY_3 }}
          AVIATIONSTACK_KEY_4: ${{ secrets.AVIATIONSTACK_KEY_4 }}
          TG_TOKEN:            ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID:          ${{ secrets.TG_CHAT_ID }}
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}

      - name: Commit and push changes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/accumulated_*.json
          if ! git diff --staged --quiet; then
            git commit -m "auto: update flight data $(date '+%Y-%m-%d %H:%M ICT')"
            git push https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git HEAD:main
          else
            echo "No changes to commit"
          fi
