name: Update HKT Data
on:
  schedule:
    - cron: '58 16 * * *'  # 23:58 ICT = 16:58 UTC
  workflow_dispatch:       # Кнопка ручного запуска

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - run: pip install requests pytz
      - run: python3 collector.py
        env:
          PYTHONPATH: .
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/dashboard.json data/accumulated_*.json
          git diff --staged --quiet || git commit -m "auto: update flight data $(date '+%Y-%m-%d %H:%M ICT')"
          git push
