<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HKT · Flight Intelligence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Mono:wght@400;500&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:          #05080F;
      --surface:     rgba(10, 15, 28, 0.9);
      --gold:        #C8A96E;
      --gold-light:  #E2C891;
      --gold-faint:  rgba(200, 169, 110, 0.07);
      --gold-border: rgba(200, 169, 110, 0.18);
      --sky:         #5BB8F5;
      --amber:       #E8A462;
      --ivory:       #EDE8DF;
      --muted:       #4E4A45;
      --muted-2:     #8A8480;
      --border:      rgba(255, 255, 255, 0.05);
      --border-card: rgba(255, 255, 255, 0.06);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Outfit', system-ui, sans-serif;
      background: var(--bg);
      color: var(--ivory);
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(200,169,110,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 90% 100%, rgba(91,184,245,0.04) 0%, transparent 50%),
        linear-gradient(rgba(255,255,255,0.012) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.012) 1px, transparent 1px);
      background-size: 100%, 100%, 52px 52px, 52px 52px;
      pointer-events: none;
      z-index: 0;
    }

    .wrap {
      position: relative;
      z-index: 1;
      max-width: 1320px;
      margin: 0 auto;
      padding: 48px 28px 72px;
    }

    /* ── Header ── */
    header {
      position: relative;
      margin-bottom: 44px;
      padding-bottom: 36px;
    }
    header::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-border) 30%, var(--gold-border) 70%, transparent);
    }
    .header-ghost {
      position: absolute;
      top: -28px; left: -8px;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(100px, 14vw, 180px);
      font-weight: 700;
      color: rgba(200, 169, 110, 0.035);
      letter-spacing: -8px;
      line-height: 1;
      pointer-events: none;
      user-select: none;
      white-space: nowrap;
    }
    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      gap: 20px;
      flex-wrap: wrap;
    }
    .header-eyebrow {
      font-size: 0.7rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 600;
      margin-bottom: 10px;
    }
    .header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.2rem, 5vw, 3.6rem);
      font-weight: 600;
      color: var(--ivory);
      line-height: 1.05;
      letter-spacing: -0.5px;
    }
    .header-title em {
      font-style: italic;
      color: var(--gold-light);
    }
    .header-meta {
      font-size: 0.78rem;
      color: var(--muted-2);
      letter-spacing: 0.5px;
      margin-top: 8px;
      font-weight: 300;
    }
    .live-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--gold-faint);
      border: 1px solid var(--gold-border);
      border-radius: 100px;
      padding: 8px 18px;
      font-size: 0.72rem;
      color: var(--gold-light);
      font-family: 'DM Mono', monospace;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    .live-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px var(--gold);
      animation: live-pulse 2.4s ease-in-out infinite;
    }
    @keyframes live-pulse {
      0%,100% { opacity:1; box-shadow:0 0 6px var(--gold); }
      50%      { opacity:.35; box-shadow:0 0 2px var(--gold); }
    }

    /* ── Tabs ── */
    .tabs-wrap { margin-bottom: 36px; }
    .tabs {
      display: flex;
      gap: 3px;
      overflow-x: auto;
      scrollbar-width: none;
      padding: 4px;
      background: rgba(255,255,255,0.025);
      border: 1px solid var(--border);
      border-radius: 14px;
      width: fit-content;
      max-width: 100%;
    }
    .tabs::-webkit-scrollbar { display: none; }
    .tab {
      padding: 9px 22px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted-2);
      white-space: nowrap;
      flex-shrink: 0;
      transition: all 0.2s ease;
    }
    .tab:hover:not(.active) { color: var(--ivory); background: rgba(255,255,255,0.04); }
    .tab.active {
      background: var(--gold);
      color: #09100A;
      font-weight: 700;
      box-shadow: 0 2px 18px rgba(200,169,110,0.28);
    }

    /* ── Metrics strip ── */
    .metrics-strip {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }
    .m-card {
      background: var(--surface);
      border: 1px solid var(--border-card);
      border-radius: 18px;
      padding: 22px 24px 20px;
      position: relative;
      overflow: hidden;
      cursor: default;
      transition: border-color 0.25s, transform 0.25s;
      animation: fade-up 0.45s ease both;
    }
    .m-card::after {
      content: '';
      position: absolute;
      top: 0; left: 16px; right: 16px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-border), transparent);
    }
    .m-card:hover { border-color: var(--gold-border); transform: translateY(-3px); }
    .m-label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 2.5px;
      color: var(--muted-2);
      margin-bottom: 12px;
      font-weight: 600;
    }
    .m-value {
      font-family: 'DM Mono', monospace;
      font-size: clamp(1.6rem, 2.5vw, 2.4rem);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -1.5px;
    }
    .col-ivory { color: var(--ivory); }
    .col-gold  { color: var(--gold); }
    .col-sky   { color: var(--sky); }
    .col-amber { color: var(--amber); }
    .m-icon {
      position: absolute;
      bottom: 14px; right: 18px;
      font-size: 2rem;
      opacity: 0.12;
      pointer-events: none;
    }

    /* ── Main Grid ── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 18px;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border-card);
      border-radius: 20px;
      padding: 26px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.25s;
      animation: fade-up 0.5s ease both;
    }
    .card:hover { border-color: var(--gold-border); }
    .card-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.15rem;
      font-weight: 600;
      color: var(--ivory);
      margin-bottom: 22px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .card-icon {
      width: 30px; height: 30px;
      background: var(--gold-faint);
      border: 1px solid var(--gold-border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      flex-shrink: 0;
    }
    /* Timeline card spans full row */
    .card-full { grid-column: 1 / -1; }

    /* ── Chart ── */
    .chart-container {
      position: relative;
      width: 100%;
      max-width: 220px;
      margin: 0 auto;
    }
    .chart-center {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .chart-center-val {
      font-family: 'DM Mono', monospace;
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--ivory);
      letter-spacing: -1px;
      line-height: 1;
    }
    .chart-center-lbl {
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--muted-2);
      margin-top: 4px;
    }
    .chart-legend {
      display: flex;
      justify-content: center;
      gap: 24px;
      margin-top: 18px;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.78rem;
      color: var(--muted-2);
    }
    .leg-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .leg-val {
      font-family: 'DM Mono', monospace;
      color: var(--ivory);
      margin-left: 2px;
    }

    /* ── Timeline bar chart ── */
    .timeline-wrap {
      position: relative;
      width: 100%;
    }

    /* ── Breakdown table ── */
    .breakdown-tabs {
      display: flex;
      gap: 6px;
      margin: 24px 0 14px;
    }
    .btab {
      padding: 6px 16px;
      border-radius: 8px;
      border: 1px solid var(--border-card);
      background: transparent;
      color: var(--muted-2);
      font-size: 0.78rem;
      font-family: 'Outfit', sans-serif;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btab:hover { color: var(--ivory); border-color: var(--gold-border); }
    .btab.active { background: var(--gold-faint); border-color: var(--gold-border); color: var(--gold-light); }
    .breakdown-table-wrap {
      overflow-x: auto;
      scrollbar-width: thin;
      scrollbar-color: var(--muted) transparent;
    }
    .breakdown-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.76rem;
      min-width: 420px;
    }
    .breakdown-table th {
      color: var(--muted-2);
      font-weight: 600;
      font-size: 0.62rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      text-align: right;
      font-family: 'DM Mono', monospace;
    }
    .breakdown-table th:first-child { text-align: left; font-family: 'Outfit', sans-serif; }
    .breakdown-table td {
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-family: 'DM Mono', monospace;
      text-align: right;
      color: var(--muted-2);
      white-space: nowrap;
    }
    .breakdown-table td:first-child {
      text-align: left;
      color: var(--ivory);
      font-family: 'Outfit', sans-serif;
      font-size: 0.8rem;
    }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table .td-total { color: var(--gold); font-weight: 500; }
    .breakdown-table .td-zero  { color: var(--muted); }

    /* ── Rank List ── */
    .rank-list { list-style: none; }
    .rank-item {
      display: grid;
      grid-template-columns: 22px 1.4rem 1fr auto;
      align-items: center;
      gap: 9px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .rank-item:last-child { border-bottom: none; }
    .rank-bar {
      position: absolute;
      bottom: 0; left: 0;
      height: 1px;
      background: var(--gold);
      opacity: 0.18;
      transition: width 0.6s cubic-bezier(0.25,1,0.5,1);
    }
    .rank-num {
      width: 22px; height: 22px;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.62rem;
      font-weight: 700;
      font-family: 'DM Mono', monospace;
    }
    .rn-1 { background: rgba(200,169,110,0.18); color: var(--gold); }
    .rn-2 { background: rgba(200,200,200,0.1);  color: #C8C8C8; }
    .rn-3 { background: rgba(180,110,60,0.15);  color: #D4915A; }
    .rn-n { background: rgba(255,255,255,0.04); color: var(--muted-2); }
    .rank-flag { font-size: 1rem; line-height: 1; justify-self: center; }
    .rank-name {
      font-size: 0.83rem;
      font-weight: 400;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: var(--ivory);
    }
    .rank-count {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 1px;
      flex-shrink: 0;
    }
    .rc-flights {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted-2);
    }
    .rc-pax {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      color: var(--muted);
      letter-spacing: 0.2px;
    }

    /* ── States ── */
    .loading-state { padding: 80px 20px; text-align: center; }
    .loading-txt {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 3px;
      color: var(--muted-2);
      text-transform: uppercase;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.25} }
    .error-state {
      background: rgba(232,100,90,0.05);
      border: 1px solid rgba(232,100,90,0.18);
      border-radius: 16px;
      padding: 28px;
      text-align: center;
      color: #E8A4A0;
      font-size: 0.88rem;
    }

    @keyframes fade-up {
      from { opacity:0; transform:translateY(18px); }
      to   { opacity:1; transform:translateY(0); }
    }

    /* ── Tablet ── */
    @media (max-width: 1000px) {
      .main-grid     { grid-template-columns: 1fr 1fr; }
      .metrics-strip { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Mobile L (≤768px) ── */
    @media (max-width: 768px) {
      .wrap          { padding: 22px 14px 48px; }

      /* Header */
      .header-ghost  { display: none; }
      header         { margin-bottom: 28px; padding-bottom: 24px; }
      .header-row    { flex-direction: column; align-items: flex-start; gap: 14px; }
      .header-eyebrow{ font-size: 0.62rem; letter-spacing: 2.5px; margin-bottom: 6px; }
      .header-title  { font-size: 2rem; }
      .header-meta   { font-size: 0.7rem; }
      .live-badge    { font-size: 0.65rem; padding: 6px 12px; gap: 6px; }
      .live-dot      { width: 6px; height: 6px; }

      /* Tabs — full width, scroll */
      .tabs-wrap     { margin-bottom: 22px; }
      .tabs          { width: 100%; max-width: 100%; }
      .tab           { flex: 1; text-align: center; padding: 8px 8px; font-size: 0.75rem; }

      /* Metrics 2×2 */
      .metrics-strip { grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 12px; }
      .m-card        { padding: 16px 16px 14px; border-radius: 14px; }
      .m-label       { font-size: 0.6rem; letter-spacing: 1.8px; margin-bottom: 8px; }
      .m-value       { font-size: 1.8rem; letter-spacing: -1px; }
      .m-icon        { font-size: 1.6rem; bottom: 10px; right: 14px; }

      /* Cards */
      .main-grid     { grid-template-columns: 1fr; gap: 12px; }
      .card-full     { grid-column: 1; }
      .card          { padding: 18px; border-radius: 16px; }
      .card-title    { font-size: 1rem; margin-bottom: 16px; gap: 8px; }
      .card-icon     { width: 26px; height: 26px; font-size: 0.75rem; border-radius: 7px; }

      /* Chart — shrink donut */
      .chart-container { max-width: 180px; }
      .chart-center-val{ font-size: 1.3rem; }
      .chart-legend  { gap: 16px; margin-top: 14px; }
      .leg-item      { font-size: 0.72rem; }

      /* Rank list */
      .rank-item     { gap: 7px; padding: 7px 0; }
      .rank-num      { width: 20px; height: 20px; font-size: 0.58rem; }
      .rank-flag     { font-size: 0.9rem; }
      .rank-name     { font-size: 0.8rem; }
      .rc-flights    { font-size: 0.76rem; }
      .rc-pax        { font-size: 0.63rem; }
    }

    /* ── Mobile M (≤480px) ── */
    @media (max-width: 480px) {
      .wrap          { padding: 16px 12px 40px; }
      .header-title  { font-size: 1.75rem; }
      .header-eyebrow{ letter-spacing: 2px; }

      /* Tabs — smaller */
      .tab           { padding: 7px 6px; font-size: 0.7rem; border-radius: 8px; }

      /* Metrics — tighter */
      .metrics-strip { gap: 8px; }
      .m-card        { padding: 14px 14px 12px; }
      .m-value       { font-size: 1.55rem; }
      .m-label       { font-size: 0.58rem; letter-spacing: 1.5px; }

      /* Cards */
      .card          { padding: 16px; border-radius: 14px; }
      .card-title    { font-size: 0.95rem; margin-bottom: 14px; }

      /* Chart */
      .chart-container { max-width: 160px; }
      .chart-center-val{ font-size: 1.2rem; }

      /* Rank — tightest */
      .rank-item     { grid-template-columns: 18px 1.2rem 1fr auto; gap: 5px; }
      .rank-num      { width: 18px; height: 18px; border-radius: 5px; font-size: 0.55rem; }
      .rank-name     { font-size: 0.76rem; }
      .rc-flights    { font-size: 0.72rem; }
      .rc-pax        { font-size: 0.6rem; }
    }

    /* ── Mobile S (≤375px — iPhone SE etc.) ── */
    @media (max-width: 375px) {
      .wrap          { padding: 14px 10px 36px; }
      .m-value       { font-size: 1.4rem; }
      .tab           { font-size: 0.65rem; padding: 7px 4px; }
      .rank-name     { font-size: 0.72rem; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <header>
      <div class="header-ghost">HKT</div>
      <div class="header-row">
        <div>
          <div class="header-eyebrow">Phuket International Airport</div>
          <div class="header-title">Flight <em>Intelligence</em></div>
          <div class="header-meta">Аналитика рейсов · Данные в реальном времени · Таиланд ICT</div>
        </div>
        <div>
          <div class="live-badge">
            <div class="live-dot"></div>
            <span id="updated">Загрузка данных...</span>
          </div>
        </div>
      </div>
    </header>

    <div class="tabs-wrap">
      <div class="tabs">
        <div class="tab active" data-k="yesterday">Вчера</div>
        <div class="tab" data-k="today">Сегодня</div>
        <div class="tab" data-k="week">Неделя</div>
        <div class="tab" data-k="month">Месяц</div>
        <div class="tab" data-k="quarter">3 месяца</div>
        <div class="tab" data-k="halfyear">6 месяцев</div>
        <div class="tab" data-k="year">Год</div>
      </div>
    </div>

    <div id="metrics-row" class="metrics-strip"></div>
    <div id="app">
      <div class="loading-state">
        <div class="loading-txt">Загрузка статистики...</div>
      </div>
    </div>

  </div>

  <script>
    const FLAGS = {
      'Russia':'🇷🇺','China':'🇨🇳','India':'🇮🇳','UAE':'🇦🇪','Singapore':'🇸🇬',
      'Malaysia':'🇲🇾','Indonesia':'🇮🇩','Thailand':'🇹🇭','Vietnam':'🇻🇳','South Korea':'🇰🇷',
      'Japan':'🇯🇵','Australia':'🇦🇺','New Zealand':'🇳🇿','UK':'🇬🇧','Germany':'🇩🇪',
      'France':'🇫🇷','Italy':'🇮🇹','Spain':'🇪🇸','Netherlands':'🇳🇱','Turkey':'🇹🇷',
      'Saudi Arabia':'🇸🇦','Qatar':'🇶🇦','Kuwait':'🇰🇼','Oman':'🇴🇲','Bahrain':'🇧🇭',
      'Jordan':'🇯🇴','Israel':'🇮🇱','Kazakhstan':'🇰🇿','Uzbekistan':'🇺🇿','Azerbaijan':'🇦🇿',
      'Armenia':'🇦🇲','Georgia':'🇬🇪','Kyrgyzstan':'🇰🇬','Tajikistan':'🇹🇯','Turkmenistan':'🇹🇲',
      'Pakistan':'🇵🇰','Bangladesh':'🇧🇩','Sri Lanka':'🇱🇰','Nepal':'🇳🇵','Cambodia':'🇰🇭',
      'Myanmar':'🇲🇲','Laos':'🇱🇦','Brunei':'🇧🇳','Hong Kong':'🇭🇰','Taiwan':'🇹🇼',
      'Macau':'🇲🇴','Maldives':'🇲🇻','Greece':'🇬🇷','Poland':'🇵🇱','Czechia':'🇨🇿',
      'Austria':'🇦🇹','Hungary':'🇭🇺','Latvia':'🇱🇻','Estonia':'🇪🇪','Finland':'🇫🇮',
      'Sweden':'🇸🇪','Norway':'🇳🇴','Denmark':'🇩🇰','Switzerland':'🇨🇭','Portugal':'🇵🇹',
      'Ukraine':'🇺🇦','Belarus':'🇧🇾','Lithuania':'🇱🇹','Moldova':'🇲🇩','Bulgaria':'🇧🇬',
      'Romania':'🇷🇴','Serbia':'🇷🇸','Croatia':'🇭🇷','Slovenia':'🇸🇮','Slovakia':'🇸🇰',
      'Luxembourg':'🇱🇺','Ireland':'🇮🇪','Iceland':'🇮🇸','Cyprus':'🇨🇾','Malta':'🇲🇹',
    };

    let data = null, activeChart = null, activeChart2 = null, cityFlagMap = {};
    const appEl     = document.getElementById('app');
    const metricsEl = document.getElementById('metrics-row');
    const tabs      = document.querySelectorAll('.tab');

    tabs.forEach(t => t.addEventListener('click', () => {
      tabs.forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      render(t.dataset.k);
    }));

    /* ── Tiny DOM helpers ── */
    function make(tag, cls) {
      const e = document.createElement(tag);
      if (cls) e.className = cls;
      return e;
    }
    function txt(e, t) { e.textContent = t; return e; }
    function ap(p, ...ch) { ch.forEach(c => p.appendChild(c)); return p; }

    /* ── Metric card ── */
    function mkMetric(label, value, colorCls, icon, delay) {
      const card = make('div', 'm-card');
      card.style.animationDelay = delay;
      ap(card,
        txt(make('div', 'm-label'), label),
        txt(make('div', 'm-value ' + colorCls), value),
        txt(make('div', 'm-icon'), icon)
      );
      return card;
    }

    /* ── Build city→flag map from all.country metadata ── */
    function buildCityFlagMap(d) {
      Object.values(d).forEach(period => {
        if (typeof period !== 'object' || !period) return;
        ['arrivals', 'departures'].forEach(side => {
          const list = period[side]?.all || period[side]?.top || [];
          list.forEach(item => {
            if (item.country) cityFlagMap[item.name] = FLAGS[item.country] || '🌍';
            else cityFlagMap[item.name] = FLAGS[item.name] || '🌍';
          });
        });
      });
    }

    /* ── Breakdown pivot table ── */
    function buildBreakdownTable(breakdown, side) {
      const byKey = side + '_by';
      // Collect all unique names sorted by total desc
      const totals = {};
      breakdown.forEach(p => {
        Object.entries(p[byKey] || {}).forEach(([name, v]) => {
          const n = typeof v === 'object' ? v.n : v;
          totals[name] = (totals[name] || 0) + n;
        });
      });
      const names = Object.keys(totals).sort((a, b) => totals[b] - totals[a]);
      if (!names.length) {
        return txt(make('p'), 'Нет данных за этот период');
      }
      const wrap  = make('div', 'breakdown-table-wrap');
      const table = make('table', 'breakdown-table');
      // Header
      const thead = make('thead');
      const hrow  = make('tr');
      ap(hrow, txt(make('th'), 'Страна / Город'));
      breakdown.forEach(p => ap(hrow, txt(make('th'), p.label)));
      ap(hrow, txt(make('th'), 'Итого'));
      ap(thead, hrow);
      table.appendChild(thead);
      // Body
      const tbody = make('tbody');
      names.forEach(name => {
        const tr = make('tr');
        const flag = cityFlagMap[name] || FLAGS[name] || '🌍';
        ap(tr, txt(make('td'), flag + ' ' + name));
        let total = 0;
        breakdown.forEach(p => {
          const raw = (p[byKey] || {})[name];
          const n = raw === undefined ? 0 : (typeof raw === 'object' ? raw.n : raw);
          total += n;
          const td = make('td', n === 0 ? 'td-zero' : '');
          td.textContent = n === 0 ? '—' : String(n);
          tr.appendChild(td);
        });
        const tdTot = make('td', 'td-total');
        tdTot.textContent = String(total);
        tr.appendChild(tdTot);
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
      wrap.appendChild(table);
      return wrap;
    }

    function mkBreakdownSection(breakdown, containerId) {
      const wrap = make('div');
      wrap.id = containerId;
      const tabsEl = make('div', 'breakdown-tabs');
      const btnArr = make('button', 'btab active');
      btnArr.textContent = '🛬 Прилёты';
      const btnDep = make('button', 'btab');
      btnDep.textContent = '🛫 Вылеты';
      ap(tabsEl, btnArr, btnDep);
      wrap.appendChild(tabsEl);
      const tableWrap = make('div');
      tableWrap.appendChild(buildBreakdownTable(breakdown, 'arrivals'));
      wrap.appendChild(tableWrap);
      btnArr.addEventListener('click', () => {
        btnArr.classList.add('active'); btnDep.classList.remove('active');
        tableWrap.replaceChildren(buildBreakdownTable(breakdown, 'arrivals'));
      });
      btnDep.addEventListener('click', () => {
        btnDep.classList.add('active'); btnArr.classList.remove('active');
        tableWrap.replaceChildren(buildBreakdownTable(breakdown, 'departures'));
      });
      return wrap;
    }

    /* ── Rank list (all items) ── */
    function mkRankList(list) {
      const ul  = make('ul', 'rank-list');
      if (!list || list.length === 0) {
        ap(ul, txt(make('li', 'rank-item'), 'Нет данных'));
        return ul;
      }
      const max = list[0]?.flights ?? list[0]?.count ?? 1;
      list.forEach((x, i) => {
        const flights = x.flights ?? x.count ?? 0;
        const li      = make('li', 'rank-item');
        const bar     = make('div', 'rank-bar');
        bar.style.width = Math.round(flights / max * 100) + '%';
        const numCls  = i === 0 ? 'rank-num rn-1' : i === 1 ? 'rank-num rn-2' : i === 2 ? 'rank-num rn-3' : 'rank-num rn-n';
        const pax     = x.pax ?? 0;
        const countEl = make('div', 'rank-count');
        ap(countEl,
          txt(make('span', 'rc-flights'), String(flights) + ' ✈'),
          txt(make('span', 'rc-pax'), '~' + pax.toLocaleString('ru') + ' чел.')
        );
        // Use parent country for Russian cities, otherwise use name
        const flagKey = x.country || x.name;
        ap(li,
          bar,
          txt(make('div', numCls), String(i + 1)),
          txt(make('span', 'rank-flag'), FLAGS[flagKey] || '🌍'),
          txt(make('span', 'rank-name'), x.name),
          countEl
        );
        ul.appendChild(li);
      });
      return ul;
    }

    /* ── Card shell ── */
    function mkCard(iconEmoji, titleText, delay, extraClass) {
      const card  = make('div', 'card' + (extraClass ? ' ' + extraClass : ''));
      card.style.animationDelay = delay;
      const title = make('div', 'card-title');
      ap(title, txt(make('div', 'card-icon'), iconEmoji), txt(make('span'), titleText));
      card.appendChild(title);
      return card;
    }

    /* ── Timeline bar chart ── */
    function timelineLabel(period) {
      if (period === 'week')                        return 'По дням';
      if (period === 'month')                       return 'По неделям';
      if (['quarter','halfyear','year'].includes(period)) return 'По месяцам';
      return '';
    }

    function getBreakdown(d, period) {
      if (period === 'week')                        return d.by_days;
      if (period === 'month')                       return d.by_weeks;
      if (['quarter','halfyear','year'].includes(period)) return d.by_months;
      return null;
    }

    function buildTimelineChart(canvasId, breakdown) {
      const labels = breakdown.map(x => x.label);
      const arr    = breakdown.map(x => x.arrivals);
      const dep    = breakdown.map(x => x.departures);

      return new Chart(document.getElementById(canvasId).getContext('2d'), {
        type: 'bar',
        data: {
          labels,
          datasets: [
            {
              label: 'Прилёты',
              data: arr,
              backgroundColor: 'rgba(91,184,245,0.55)',
              borderColor: '#5BB8F5',
              borderWidth: 1.5,
              borderRadius: 4,
            },
            {
              label: 'Вылеты',
              data: dep,
              backgroundColor: 'rgba(232,164,98,0.55)',
              borderColor: '#E8A462',
              borderWidth: 1.5,
              borderRadius: 4,
            }
          ]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: {
              display: true,
              labels: { color: '#8A8480', font: { family: 'DM Mono', size: 11 }, boxWidth: 12, padding: 16 }
            },
            tooltip: {
              backgroundColor: 'rgba(10,15,28,0.95)',
              borderColor: 'rgba(200,169,110,0.2)',
              borderWidth: 1,
              titleColor: '#EDE8DF',
              bodyColor: '#8A8480',
              padding: 12, cornerRadius: 10,
            }
          },
          scales: {
            x: {
              ticks: { color: '#8A8480', font: { family: 'DM Mono', size: 10 }, maxRotation: 45 },
              grid:  { color: 'rgba(255,255,255,0.04)' }
            },
            y: {
              ticks: { color: '#8A8480', font: { family: 'DM Mono', size: 10 } },
              grid:  { color: 'rgba(255,255,255,0.04)' },
              beginAtZero: true
            }
          }
        }
      });
    }

    /* ── Main render ── */
    function render(period) {
      const d = data?.[period];
      if (!d) return;
      const total = d.arrivals.count + d.departures.count;
      const pax   = d.arrivals.pax   + d.departures.pax;

      metricsEl.replaceChildren(
        mkMetric('Всего рейсов',  String(total),              'col-ivory', '✈',  '0s'),
        mkMetric('Пассажиров',    pax.toLocaleString('ru'),   'col-gold',  '👤', '0.06s'),
        mkMetric('Прилёты',       String(d.arrivals.count),   'col-sky',   '🛬', '0.12s'),
        mkMetric('Вылеты',        String(d.departures.count), 'col-amber', '🛫', '0.18s')
      );

      const grid = make('div', 'main-grid');

      /* Donut chart card */
      const chartCard = mkCard('📊', 'Распределение рейсов', '0.06s');
      const wrap      = make('div', 'chart-container');
      const canvas    = document.createElement('canvas');
      canvas.id = 'mainChart'; canvas.height = 220;
      const center  = make('div', 'chart-center');
      ap(center, txt(make('div', 'chart-center-val'), String(total)), txt(make('div', 'chart-center-lbl'), 'рейсов'));
      ap(wrap, canvas, center);
      const legend  = make('div', 'chart-legend');
      const legA    = make('div', 'leg-item');
      const dotA    = make('div', 'leg-dot'); dotA.style.background = '#5BB8F5';
      ap(legA, dotA, document.createTextNode(' Прилёты '), txt(make('span','leg-val'), String(d.arrivals.count)));
      const legD    = make('div', 'leg-item');
      const dotD    = make('div', 'leg-dot'); dotD.style.background = '#E8A462';
      ap(legD, dotD, document.createTextNode(' Вылеты '),  txt(make('span','leg-val'), String(d.departures.count)));
      ap(legend, legA, legD);
      ap(chartCard, wrap, legend);
      grid.appendChild(chartCard);

      /* Arrivals card — all flights, no top-10 limit */
      const arrCard = mkCard('🛬', 'Прилёты', '0.12s');
      arrCard.appendChild(mkRankList(d.arrivals.all || d.arrivals.top));
      grid.appendChild(arrCard);

      /* Departures card — all flights, no top-10 limit */
      const depCard = mkCard('🛫', 'Вылеты', '0.18s');
      depCard.appendChild(mkRankList(d.departures.all || d.departures.top));
      grid.appendChild(depCard);

      /* Timeline card (week/month/quarter/halfyear/year) */
      const breakdown = getBreakdown(d, period);
      if (breakdown && breakdown.length > 0) {
        const label = timelineLabel(period);
        const timeCard = mkCard('📅', label, '0.24s', 'card-full');
        const tw = make('div', 'timeline-wrap');
        const c2 = document.createElement('canvas');
        c2.id = 'timelineChart';
        tw.appendChild(c2);
        timeCard.appendChild(tw);
        timeCard.appendChild(mkBreakdownSection(breakdown, 'breakdown-section'));
        grid.appendChild(timeCard);
      }

      appEl.replaceChildren(grid);

      /* Destroy old charts */
      if (activeChart)  { activeChart.destroy();  activeChart  = null; }
      if (activeChart2) { activeChart2.destroy(); activeChart2 = null; }

      /* Donut */
      activeChart = new Chart(document.getElementById('mainChart').getContext('2d'), {
        type: 'doughnut',
        data: {
          labels: ['Прилёты', 'Вылеты'],
          datasets: [{
            data: [d.arrivals.count, d.departures.count],
            backgroundColor: ['rgba(91,184,245,0.75)', 'rgba(232,164,98,0.75)'],
            borderColor: ['#5BB8F5', '#E8A462'],
            borderWidth: 2,
            hoverBorderWidth: 3,
            hoverOffset: 6,
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: true, cutout: '68%',
          plugins: {
            legend: { display: false },
            tooltip: {
              backgroundColor: 'rgba(10,15,28,0.95)',
              borderColor: 'rgba(200,169,110,0.2)',
              borderWidth: 1,
              titleColor: '#EDE8DF',
              bodyColor: '#8A8480',
              padding: 12, cornerRadius: 10,
              callbacks: { label: c => ' ' + c.label + ': ' + c.parsed + ' рейсов' }
            }
          }
        }
      });

      /* Timeline bar chart */
      if (breakdown && breakdown.length > 0) {
        activeChart2 = buildTimelineChart('timelineChart', breakdown);
      }
    }

    function getDefaultPeriod() {
      if (!data) return 'today';
      if (data.today?.arrivals?.count > 0) return 'today';
      if (data.yesterday?.arrivals?.count > 0) return 'yesterday';
      return 'week';
    }

    async function init() {
      try {
        const res = await fetch('./data/dashboard.json?t=' + Date.now());
        if (!res.ok) throw new Error('HTTP ' + res.status);
        data = await res.json();
        buildCityFlagMap(data);

        const dt = new Date(data.updated);
        document.getElementById('updated').textContent =
          dt.toLocaleString('ru-RU', { timeZone:'Asia/Bangkok', hour:'2-digit', minute:'2-digit', day:'2-digit', month:'2-digit' }) + ' ICT';

        const period = getDefaultPeriod();
        tabs.forEach(t => t.classList.toggle('active', t.dataset.k === period));
        render(period);

      } catch(e) {
        const err = make('div', 'error-state');
        ap(err, txt(make('p'), '⚠ Не удалось загрузить данные.'));
        appEl.replaceChildren(err);
      }
    }

    init();

    setInterval(async () => {
      try {
        const r  = await fetch('./data/dashboard.json?t=' + Date.now());
        const nd = await r.json();
        if (nd.updated !== data?.updated) {
          data = nd;
          const cur = document.querySelector('.tab.active')?.dataset.k || getDefaultPeriod();
          render(cur);
        }
      } catch(_) {}
    }, 15 * 60 * 1000);
  </script>
</body>
</html>
